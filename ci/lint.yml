# Lint rápido: `php -l` em todo .php (PHP 7.4 e 8.2) e `bash -n` nos scripts.
name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: php -l em todos os .php
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f"; then
              fail=1
            fi
          done < <(find . -type f -name '*.php' -not -path './vendor/*' -print0)
          exit "$fail"

  shell:
    name: bash -n + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n nos scripts
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            if bash -n "$f"; then
              echo "ok: $f"
            else
              echo "FALHOU: $f"
              fail=1
            fi
          done < <(find . -type f -name '*.sh' -print0)
          exit "$fail"

      - name: shellcheck (informativo)
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          find . -type f -name '*.sh' -print0 | xargs -0 -r shellcheck -x || true
